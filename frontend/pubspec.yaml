name: simpulx
description: Simpulx - Omnichannel WhatsApp Business Platform
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  flutter_riverpod: ^2.4.9
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^13.0.0
  
  # Networking
  dio: ^5.4.0
  
  # WebSocket
  socket_io_client: ^2.0.3+1
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Web APIs
  web: ^1.0.0
  http: ^1.6.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  data_table_2: ^2.5.15
  
  # Utilities
  uuid: ^4.2.2
  timeago: ^3.6.1
  url_launcher: ^6.2.2
  
  # Icons
  cupertino_icons: ^1.0.6
  lucide_icons: ^0.257.0
  
  # Emoji
  emoji_picker_flutter: ^4.4.0
  
  # File Picker
  file_picker: ^8.0.0

  # Audio Recording
  record: ^6.2.0
  path_provider: ^2.1.5

  # Audio Playback
  just_audio: ^0.9.43

  # Firebase (Push Notifications)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1
  flutter_local_notifications: ^18.0.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/simpulx_logo.png"
  adaptive_icon_background: "#0A1A1A"
  adaptive_icon_foreground: "assets/images/simpulx_logo.png"

flutter_native_splash:
  color: "#040F0D"
  image: "assets/images/splash_logo.png"
  android_12:
    color: "#040F0D"
    image: "assets/images/splash_logo.png"
    icon_background_color: "#040F0D"
  ios: true
  web: true
  web_image_mode: center

flutter:
  uses-material-design: true

  assets:
    - assets/images/
