# Production overlay. Use together with the base compose:
#   docker compose --env-file .env -f deploy/docker/compose.yml -f deploy/docker/compose.prod.yml pull
#   docker compose --env-file .env -f deploy/docker/compose.yml -f deploy/docker/compose.prod.yml up -d
#
# Prod PULLS pre-built images from ECR (built & pushed by CI); it does NOT build.
# IMAGE_TAG (set by the deploy step) selects the version -> rollback = an older tag.
# The base compose.yml keeps `build:` for local dev.
name: simpulx-v2

services:
  # Backend API: pull from ECR; no public port in prod (Caddy proxies it).
  # !reset clears the base compose's published port (Compose otherwise MERGES them).
  gateway:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/gateway:${IMAGE_TAG:-latest}
    ports: !reset []
    environment:
      MEDIA_PUBLIC_BASE: https://app.simpulx.com/simpulx-media
      # Public origin of this gateway (Caddy proxies /webhook/* here). Used to
      # register the Viber inbound webhook as https://app.simpulx.com/webhook/viber/{id}.
      PUBLIC_API_URL: https://app.simpulx.com
      # Migrations are run as a dedicated deploy step (MIGRATE_ONLY), not on boot.
      RUN_MIGRATIONS_ON_BOOT: "false"

  messaging:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/messaging:${IMAGE_TAG:-latest}
  conversation:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/conversation:${IMAGE_TAG:-latest}
  broadcasts:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/broadcasts:${IMAGE_TAG:-latest}
  ai-agent:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/ai-agent:${IMAGE_TAG:-latest}
  knowledge:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/knowledge:${IMAGE_TAG:-latest}

  # WebSocket: pull from ECR; no public port in prod (Caddy proxies /ws).
  realtime:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/realtime:${IMAGE_TAG:-latest}
    ports: !reset []

  # Next.js web app (image built in CI; NEXT_PUBLIC_* baked there from repo variables).
  web:
    image: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx/web:${IMAGE_TAG:-latest}
    container_name: simpulx-v2-web
    restart: unless-stopped
    depends_on: [gateway]
    networks: [simpulx]
    # Runtime env for the Next server. MAPS_KEY (Google Maps Embed) is read at
    # request time on the property listing pages, so it lives here rather than as a
    # NEXT_PUBLIC build arg -- set it in /opt/simpulx/.env, no rebuild needed.
    environment:
      MAPS_KEY: ${MAPS_KEY:-}

  # Edge: TLS termination (Cloudflare Origin Cert) + routing.
  caddy:
    image: caddy:2-alpine
    container_name: simpulx-v2-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - ./landing:/srv/landing:ro
      - v2_caddy_data:/data
      - v2_caddy_config:/config
    depends_on: [web, gateway, realtime]
    networks: [simpulx]

volumes:
  v2_caddy_data:
  v2_caddy_config:
