name: simpulx

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: simpulx-api:latest
    container_name: simpulx-api
    restart: unless-stopped
    env_file:
      - ${SIMPULX_ENV_FILE:-./.env}
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-simpulx}
      DB_DATABASE: ${DB_DATABASE:-simpulx_crm}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_DIR: /var/lib/simpulx/uploads
      UPLOADS_DIR: /var/lib/simpulx/uploads
    ports:
      - "127.0.0.1:${API_HOST_PORT:-3002}:3002"
    volumes:
      - ${UPLOADS_VOLUME:-simpulx_uploads}:/var/lib/simpulx/uploads
      - ${SIMPULX_CONFIG_DIR:-./deploy/local-secrets}:/etc/simpulx:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - simpulx

  postgres:
    image: postgres:16-alpine
    container_name: simpulx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-simpulx}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_DATABASE:-simpulx_crm}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ${POSTGRES_VOLUME:-simpulx_postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-simpulx} -d ${DB_DATABASE:-simpulx_crm}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - simpulx

  redis:
    image: redis:7-alpine
    container_name: simpulx-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - ${REDIS_VOLUME:-simpulx_redis_data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - simpulx

  nginx:
    image: nginx:1.27-alpine
    container_name: simpulx-nginx
    restart: unless-stopped
    profiles:
      - edge
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/simpulx.docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing:/usr/share/nginx/landing:ro
      - ./frontend/build/web:/usr/share/nginx/app:ro
      - ${UPLOADS_VOLUME:-simpulx_uploads}:/var/lib/simpulx/uploads:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - simpulx

networks:
  simpulx:
    name: simpulx

volumes:
  simpulx_postgres_data:
    name: simpulx_postgres_data
  simpulx_redis_data:
    name: simpulx_redis_data
  simpulx_uploads:
    name: simpulx_uploads
