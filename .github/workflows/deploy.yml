name: Deploy Simpulx

# Build images in CI (native ARM runner) -> push to ECR -> the EC2 box just PULLS
# and restarts. Prod never builds. Only services whose source changed are rebuilt;
# unchanged ones are re-tagged (latest -> :sha) so every commit has a full set of
# :sha tags (immutable; rollback = run with an older image_tag).
#
# AWS backing (provisioned): IAM role simpulx-gha-deploy (OIDC + ssm:SendCommand +
# ecr-push to simpulx/*); instance role simpulx-ssm-role (+ ecr-pull); 8 ECR repos.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (blank = build current commit). Use an older SHA to roll back."
        required: false
        default: ""

concurrency:
  group: simpulx-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-3
  INSTANCE_ID: i-070b5297fbc58bb8c
  DEPLOY_ROLE: arn:aws:iam::825621302344:role/simpulx-gha-deploy
  ECR: 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com/simpulx

jobs:
  # Which services changed? (skipped on a rollback dispatch with an explicit tag)
  changes:
    if: github.event_name == 'push' || github.event.inputs.image_tag == ''
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.set.outputs.changed }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            go: &go
              - 'libs/go/**'
              - 'go.mod'
              - 'go.sum'
              - 'deploy/docker/go.Dockerfile'
            gateway:
              - *go
              - 'services/gateway/**'
              - 'db/migrations/**'
            messaging:
              - *go
              - 'services/messaging/**'
            conversation:
              - *go
              - 'services/conversation/**'
            broadcasts:
              - *go
              - 'services/broadcasts/**'
            realtime:
              - *go
              - 'services/realtime/**'
            web:
              - 'web/**'
            aiagent:
              - 'services/ai-agent/**'
              - 'libs/python/**'
            knowledge:
              - 'services/knowledge/**'
              - 'libs/python/**'
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch without a tag = force-rebuild current main.
            CHANGED='{"gateway":"true","messaging":"true","conversation":"true","broadcasts":"true","realtime":"true","web":"true","ai-agent":"true","knowledge":"true"}'
          else
            CHANGED='{"gateway":"${{ steps.f.outputs.gateway }}","messaging":"${{ steps.f.outputs.messaging }}","conversation":"${{ steps.f.outputs.conversation }}","broadcasts":"${{ steps.f.outputs.broadcasts }}","realtime":"${{ steps.f.outputs.realtime }}","web":"${{ steps.f.outputs.web }}","ai-agent":"${{ steps.f.outputs.aiagent }}","knowledge":"${{ steps.f.outputs.knowledge }}"}'
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          case "$CHANGED" in *'"true"'*) echo "any=true" >> "$GITHUB_OUTPUT" ;; *) echo "any=false" >> "$GITHUB_OUTPUT" ;; esac

  build:
    name: Build/retag ${{ matrix.name }}
    needs: changes
    if: ${{ (github.event_name == 'push' || github.event.inputs.image_tag == '') && needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gateway,      dockerfile: deploy/docker/go.Dockerfile,   context: ., buildargs: "SERVICE=gateway" }
          - { name: messaging,    dockerfile: deploy/docker/go.Dockerfile,   context: ., buildargs: "SERVICE=messaging" }
          - { name: conversation, dockerfile: deploy/docker/go.Dockerfile,   context: ., buildargs: "SERVICE=conversation" }
          - { name: broadcasts,   dockerfile: deploy/docker/go.Dockerfile,   context: ., buildargs: "SERVICE=broadcasts" }
          - { name: realtime,     dockerfile: deploy/docker/go.Dockerfile,   context: ., buildargs: "SERVICE=realtime" }
          - { name: ai-agent,     dockerfile: services/ai-agent/Dockerfile,  context: ., buildargs: "" }
          - { name: knowledge,    dockerfile: services/knowledge/Dockerfile, context: ., buildargs: "" }
          - name: web
            dockerfile: web/Dockerfile
            context: web
            buildargs: |
              NEXT_PUBLIC_API_URL=https://app.simpulx.com
              NEXT_PUBLIC_WS_URL=wss://app.simpulx.com
              NEXT_PUBLIC_META_APP_ID=${{ vars.NEXT_PUBLIC_META_APP_ID }}
              NEXT_PUBLIC_META_CONFIG_ID=${{ vars.NEXT_PUBLIC_META_CONFIG_ID }}
              NEXT_PUBLIC_META_VERIFY_TOKEN=${{ vars.NEXT_PUBLIC_META_VERIFY_TOKEN }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Changed: build & push a fresh image ──
      - if: ${{ fromJson(needs.changes.outputs.changed)[matrix.name] == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2
      - if: ${{ fromJson(needs.changes.outputs.changed)[matrix.name] == 'true' }}
        uses: actions/checkout@v4
      - if: ${{ fromJson(needs.changes.outputs.changed)[matrix.name] == 'true' }}
        uses: docker/setup-buildx-action@v3
      - name: Build & push ${{ matrix.name }}
        if: ${{ fromJson(needs.changes.outputs.changed)[matrix.name] == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.buildargs }}
          push: true
          tags: |
            ${{ env.ECR }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.ECR }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # The web gha cache went stale (served a COPY/build layer from before new
          # routes existed, so fresh source produced an old image -> new pages 404'd).
          # Build web without cache so the layer can't be reused; cache-to still
          # refreshes the scope with correct layers.
          no-cache: ${{ matrix.name == 'web' }}
          provenance: false

      # ── Unchanged: re-tag the existing :latest as :sha (no rebuild) ──
      - name: Re-tag latest -> sha (${{ matrix.name }})
        if: ${{ fromJson(needs.changes.outputs.changed)[matrix.name] != 'true' }}
        run: |
          set -euo pipefail
          M=$(aws ecr batch-get-image --region "$AWS_REGION" --repository-name "simpulx/${{ matrix.name }}" \
                --image-ids imageTag=latest --query 'images[0].imageManifest' --output text)
          if [ -z "$M" ] || [ "$M" = "None" ]; then echo "no :latest for ${{ matrix.name }}; nothing to retag"; exit 0; fi
          aws ecr put-image --region "$AWS_REGION" --repository-name "simpulx/${{ matrix.name }}" \
                --image-tag "${{ github.sha }}" --image-manifest "$M" >/dev/null 2>&1 || true
          echo "re-tagged simpulx/${{ matrix.name }}:latest -> :${{ github.sha }}"

  deploy:
    name: Deploy to EC2 (pull from ECR via SSM)
    needs: [build]
    # Deploy on a rollback dispatch (image_tag given) or whenever build actually ran
    # (i.e. something changed). A no-op push (no service changed) skips build + deploy.
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '') || needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM Run Command
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "Deploying image tag: $TAG"

          # The box self-authenticates to ECR via its instance role; only IMAGE_TAG
          # is injected (via the __TAG__ placeholder). Keeps the script free of secrets.
          read -r -d '' SCRIPT <<'REMOTE' || true
          set -eu
          runuser -l ubuntu -s /bin/bash -c '
          set -euo pipefail
          cd /opt/simpulx
          echo "-- sync configs --"
          git fetch origin main && git reset --hard origin/main && git rev-parse --short HEAD
          echo "-- ensure aws cli --"
          if ! command -v aws >/dev/null 2>&1; then
            command -v unzip >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y -qq unzip; }
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscliv2.zip
            unzip -q -o /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update >/dev/null
          fi
          echo "-- ecr login --"
          aws ecr get-login-password --region ap-southeast-3 | docker login --username AWS --password-stdin 825621302344.dkr.ecr.ap-southeast-3.amazonaws.com
          export IMAGE_TAG=__TAG__
          DC="docker compose --env-file .env -f deploy/docker/compose.yml -f deploy/docker/compose.prod.yml"
          # NOTE: this whole block runs inside runuser -c SINGLE-quoted; never use
          # single quotes below or the script silently truncates at that point.
          echo "-- disk --"; df -h / | tail -1
          echo "-- web BEFORE --"; docker ps --filter name=web --format "{{.Image}} {{.Status}}" || true
          echo "-- pre-deploy cleanup --"
          # Prune ALL unused images (no age filter). Rapid same-day web rebuilds
          # (no-cache -> a fresh multi-GB image every commit) pile up; a 72h filter
          # never removes them, the disk hits 100%, and then --force-recreate deletes
          # caddy WITHOUT being able to recreate it (ENOSPC) -> nothing on :443 ->
          # Cloudflare 521. Everything is re-pullable from ECR, so dropping old local
          # tags here is safe (rollback just re-pulls).
          docker image prune -af >/dev/null 2>&1 || true
          docker builder prune -af >/dev/null 2>&1 || true
          docker container prune -f >/dev/null 2>&1 || true
          echo "-- disk after cleanup --"; df -h / | tail -1
          echo "-- pull (web lines only) --"
          $DC pull 2>&1 | grep -iE "web|error|denied|not found" | tail -6 || true
          echo "-- migrate --"
          $DC run --rm -e MIGRATE_ONLY=true gateway >/dev/null 2>&1 && echo "migrate ok" || echo "migrate FAILED"
          echo "-- up (web lines only) --"
          $DC up -d --pull always --force-recreate --remove-orphans 2>&1 | grep -iE "web|error|recreat|creat" | tail -8 || true
          echo "-- web AFTER --"; docker ps --filter name=web --format "{{.Image}} {{.Status}}" || true
          echo "-- refresh caddy --"
          $DC restart caddy
          # Post-deploy: clean up anything the new deploy left behind.
          docker image prune -f >/dev/null 2>&1 || true
          docker builder prune -af --filter until=72h >/dev/null 2>&1 || true
          docker image prune -af --filter until=72h >/dev/null 2>&1 || true
          echo "-- status --"
          $DC ps
          # Fail the deploy LOUDLY here if the edge is down, instead of leaving a
          # silent 521 for the health-check step to discover. force-recreate on a full
          # disk is the known way caddy ends up gone (see pre-deploy cleanup note).
          echo "-- edge check --"
          ss -ltn | grep -q ":443 " || { echo "FATAL: nothing listening on :443 (caddy down)"; docker ps -a --filter name=caddy; exit 1; }
          echo "edge ok: :443 is listening"
          '
          REMOTE
          SCRIPT="${SCRIPT/__TAG__/$TAG}"

          jq -n --arg s "$SCRIPT" '{commands:[$s], executionTimeout:["3600"]}' > params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "GHA deploy ${TAG:0:7}" \
            --timeout-seconds 600 \
            --parameters file://params.json \
            --query 'Command.CommandId' --output text)
          echo "SSM CommandId: $CMD_ID"

          FAILED=0
          while true; do
            sleep 10
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo Pending)
            echo "status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) FAILED=1; break ;;
            esac
          done

          echo "──────── remote stdout ────────"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
          echo "──────── remote stderr ────────"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true

          if [ "$FAILED" = "1" ]; then echo "::error::SSM deploy failed"; exit 1; fi

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 https://app.simpulx.com/ || echo 000)
            echo "attempt $i: app.simpulx.com -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 12
          done
          echo "::error::app did not return 200 after deploy" >&2
          exit 1
