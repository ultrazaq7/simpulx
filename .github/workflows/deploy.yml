name: Deploy Simpulx

# Auto-deploy the Go + Next.js compose stack to the AWS Graviton box on every
# push to main (or manually via "Run workflow"). The runner SSHes into the box,
# fast-forwards /opt/simpulx to origin/main, and rebuilds the stack. DB schema is
# applied automatically — the gateway runs goose.Up() from db/migrations on boot.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST  -> 108.136.155.65            (the EC2 Elastic IP)
#   SSH_USER  -> ubuntu                    (login user on the box)
#   SSH_KEY   -> private key whose PUBLIC half is in the box's
#                ~/.ssh/authorized_keys  (this is the runner→box key; it is NOT
#                the repo "deploy key", which only lets the box pull from GitHub)
#   SSH_PORT  -> optional, defaults to 22

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: simpulx-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to AWS (simpulx-prod)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            APP_DIR=/opt/simpulx
            cd "$APP_DIR"

            echo "── Syncing repo to origin/main ──"
            git fetch origin main
            git reset --hard origin/main      # untracked .env / certs are kept
            git rev-parse --short HEAD

            DC="docker compose --env-file .env -f deploy/docker/compose.yml -f deploy/docker/compose.prod.yml"

            echo "── Building + restarting stack ──"
            $DC up -d --build
            docker image prune -f >/dev/null 2>&1 || true

            echo "── Status ──"
            $DC ps

      - name: Health check
        run: |
          set -e
          for i in $(seq 1 10); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 https://app.simpulx.com/ || echo 000)
            echo "attempt $i: app.simpulx.com -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 12
          done
          echo "app did not return 200 after deploy" >&2
          exit 1
